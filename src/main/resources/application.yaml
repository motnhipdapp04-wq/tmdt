spring:
  application:
    name: dungcony

  profiles:
    active: dev

  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{logType:-SYSTEM}] [%X{reqId:-N/A}] [%thread] [%X{method:-} %X{path:-}] %logger{36} : %msg%n"
  level:
    root: info
    com.dev.dungcony: info
    org.springframework: warn
    org.springframework.security: warn
    org.springframework.data.redis.repository.config: off
    org.hibernate: warn
  file:
    name: logs/app.log

jwt:
  # Railway: ưu tiên biến môi trường JWT_SECRET (không cần khai thêm trong application-prod bằng ${JWT_SECRET}).
  secret: ${JWT_SECRET}
  expiration: 100000 #  
  refresh-expiration: 604800 # 7 ngày (s)

server:
  host: localhost
  port: ${PORT:8080}
  address: 0.0.0.0


# ===== VNPay =====
# - pay-url: để trống + không set VNPAY_URL → dùng URL sandbox mặc định
# - return-url: VNPAY_RETURN_URL (URL đầy đủ) hoặc để trống và dùng public-app-base-url / RAILWAY_PUBLIC_DOMAIN (Railway)
vnpay:
  tmn-code: ${VNPAY_TMN_CODE:CGXZLS0Z}
  hash-secret: ${VNPAY_HASH_SECRET:XNBCJFAKAZQSGTARRLGCHVZWCIOIGSHN}
  pay-url: ${VNPAY_URL:}
  return-url: ${VNPAY_RETURN_URL:}
  public-app-base-url: ${PUBLIC_APP_BASE_URL:}
  version: "2.1.0"
  command: pay
  order-type: other

# ===== VietQR / Bank transfer QR =====
# bank-id: BIN hoặc mã ngân hàng theo VietQR (vd: 970422, VCB, MB...)
# account-name và content-prefix nên dùng không dấu để app ngân hàng hiển thị ổn định.
vietqr:
  enabled: ${VIETQR_ENABLED:true}
  bank-id: ${VIETQR_BANK_ID:970422}
  account-no: ${VIETQR_ACCOUNT_NO:0345883926}
  account-name: ${VIETQR_ACCOUNT_NAME:LUONG TIEN DUNG}
  template: ${VIETQR_TEMPLATE:compact2}
  content-prefix: ${VIETQR_CONTENT_PREFIX:}
  image-base-url: ${VIETQR_IMAGE_BASE_URL:https://img.vietqr.io/image}
  service-code: ${VIETQR_SERVICE_CODE:QRIBFTTA}
  callback-username: ${VIETQR_CALLBACK_USERNAME:vietqr}
  callback-password: ${VIETQR_CALLBACK_PASSWORD:vietqr}
  callback-token-secret: ${VIETQR_CALLBACK_TOKEN_SECRET:vietqr-callback-secret-change-me-in-production-2026-05-19-hs512-key}
  callback-token-ttl-seconds: ${VIETQR_CALLBACK_TOKEN_TTL_SECONDS:300}

# ===== Swagger / OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    withCredentials: true
