spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      data-source-properties:
        # PostgreSQL qua PgBouncer (Railway “public” URL): transaction pooling + prepared stmt → lỗi "S_1 already exists"
        prepareThreshold: 0
  
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      ssl:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    redis:
      enabled: false
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: warn
    com.dev.dungcony: info

# Railway: reverse proxy bật X-Forwarded-* để request được coi là https và Swagger dùng đúng URL.
server:
  forward-headers-strategy: framework

# VNPay: khai VNPAY_RETURN_URL (URL đủ) hoặc PUBLIC_APP_BASE_URL (https://... không dấu / cuối).
# Trên Railway có thể không cần gán nếu dùng biến RAILWAY_PUBLIC_DOMAIN (tự tạo return URL https).

# ===== Swagger / OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

jwt:
  # Set JWT_SECRET trên server (≥32 ký tự). Default chỉ để bind YAML; JwtConfig từ chối nếu prod còn secret dev.
  secret: ${JWT_SECRET}
  refresh-cookie:
    secure: true
    path: /v1/api/public/auth
    
# Gửi mail: nếu có SENDGRID_API_KEY thì dùng SendGrid API (HTTPS), không cần mở SMTP 587 (Railway hay chặn).
app:
  email:
    sendgrid-api-key: ${SENDGRID_API_KEY:}
